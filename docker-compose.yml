version: '3.8'

services:
  client-frontend:
    build:
      context: ./client-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend-api
    volumes:
      - ./client-frontend:/app
      - /app/node_modules

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend-api
    volumes:
      - ./admin-frontend:/app
      - /app/node_modules

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=moodflow
      - DB_PASSWORD=moodflow_secret
      - DB_NAME=moodflow
      - JWT_SECRET=change_me_jwt_secret
      - JWT_REFRESH_SECRET=change_me_refresh_secret
      - CORS_ORIGIN=http://localhost:3000,http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-api:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=moodflow
      - POSTGRES_USER=moodflow
      - POSTGRES_PASSWORD=moodflow_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodflow -d moodflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
